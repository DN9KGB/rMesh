
<head>
<style>

@font-face {
  font-family: 'FixedsysExcelsior';
  /* Stelle sicher, dass die Datei im selben Ordner wie die CSS-Datei liegt */
  src: url('Fixedsys_Excelsior.woff') format('woff');
  font-weight: normal;
  font-style: normal;

}

html {
    /* Verhindert Glättung von Bildern/Icons beim Skalieren */
    image-rendering: pixelated;
    image-rendering: crisp-edges; /* Für Firefox */

    /* Verhindert Schriftglättung (Antialiasing) */
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
    font-smooth: never;
}

body, button {
    font-family: 'FixedsysExcelsior', 'Courier New', monospace;
    font-size: 18px;
    padding: 0px;
    margin: 0px;
}

/* Obere Navigationsleiste */
        .top-nav {
            position: fixed;
            top: 0px;
            width: 100%;
            height: 25%;
            display: flex;
            background: #ff5e00;
            color: #FFFFFF;
        }

        .links {
            flex-grow: 1;  
            display: flex;     
            flex-direction: column;
            align-items: flex-start;
        }

        .upper-input {
            background: #5555ff;
            border: none;
            outline: none;
            padding: 0;
            margin: 0;
            resize: none; 
            overflow: hidden;             
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            font-weight: inherit;
            width: 100%;
            height: calc(100% - 55px);
        }

        .channel-switch {
            background: #aa1f1f;
            width: 100%;
            height: 35px;
            display: flex;       /* Aktiviert Flexbox für die Button-Reihe */
            width: 100%;         /* Nutzt die volle Breite von .links */
            gap: 0px;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
        }

        .status-box {
            background: #aa00aa;
            width: 100%;
            height: 30px;
            display: flex;       /* Aktiviert Flexbox für die Button-Reihe */
            width: 100%;         /* Nutzt die volle Breite von .links */
            gap: 0px;
        }        

        .status {
            height: 22px;
            width: 100%;         /* Nutzt die volle Breite von .links */
            border: 1px solid #ffffff;
            padding: 3px;
            text-align: left;
            align-items: center;
            display: flex;
            justify-content: flex-start;  
        }        

        .rechts {
            width: 150px;        /* Fixe Breite */
            flex-shrink: 0;      /* Verhindert, dass das Div bei wenig Platz schrumpft */
            text-align: center;   /* Text innerhalb ist rechtsbündig */
            background: #00aa00;
            border: 1px solid #ffffff;
        }

        .clock {
            width: 100%;
            height: calc(100% - 52px);
            aspect-ratio: 1 / 1;
        }

        .grey-text-box {
            background: #555555;
            margin-top: 4px;
            margin-bottom: 4px;
            margin-left: 5px;
            margin-right: 5px;
            height: 18px;
            border: 1px solid #ffffff;
        }

        .top-button {
            position: fixed;
            top: 110%;
            height: 40px;
            width: 100%;
            background: #ff42428f;
        }        

        .content {
            position: fixed;
            top: 25%;
            width: 100%;
            height: 50%;
            background: #555555;
            color: #FFFFFF;
            z-index: 0;          
        }

        .monitor {
            position: fixed;
            top: 75%;
            width: 100%;
            height: 50%;
            background: #0000aa;
            color: #aaaaaa;
            border-top: 4px solid #aaaaaa;
      
        }        

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 10%;
            display: flex;
            background: #aa1f1f;
            border: 1px solid #ffffff;
            gap: 0px;
        }


.channel-button {
    flex-grow: 1;        /* Das ist der Zaubertrick: Jeder Button dehnt sich maximal aus */
    flex-basis: 0;
  background-color: #555555;
  color: #aaaaaa;
  margin: 2px; 
  
  /* Sehr feiner Rahmen statt dicker Kante */
  border: 1px solid #222;
  border-radius: 0px;
  cursor: pointer;
            font-family: inherit;
            font-size: inherit;  
            text-shadow: 1px 1px 0px #000000;
  /* Minimaler Schatten für Tiefe */
  box-shadow: 
    inset 1px 1px 1px rgba(255, 255, 255, 0.1), /* Ganz feine Lichtkante oben */
    0px 2px 4px rgba(0, 0, 0, 0.4);            /* Weicher Schatten nach unten */
    
  outline: none;
}

/* Der dezente Drück-Effekt */
.channel-button:active {
  /* Schatten verschwindet fast ganz */
  box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.5); 
    
  /* Nur 1 Pixel Bewegung nach unten */
  transform: translateY(1px);
  
  /* Hintergrund wird minimal dunkler */
  background-color: #812222;

}


.main-button {
    flex-grow: 1;
    flex-basis: 0;
    background-color: #00aaaa;
    color: #000000;
    margin: 2px;
    height: calc(100% - 4px);
    
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* Schiebt den Text nach unten */
    padding: 4px;
    
    border: 1px solid #222;
    border-radius: 0px;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    outline: none;
    
    /* WICHTIG: Erlaubt absoluten Kindern, sich an diesem Button auszurichten */
    position: relative; 
    overflow: hidden; /* Verhindert, dass das Bild über den Button-Rand ragt */

    box-shadow: 
        inset 1px 1px 1px rgba(255, 255, 255, 0.1),
        0px 2px 4px rgba(0, 0, 0, 0.4);
}

/* Das Bild oben links */
.button-icon {
    image-rendering: pixelated;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 0px; 
    height: 90%; 
    width: auto;
    z-index: 0;
    object-fit: contain;
    pointer-events: none;
}

/* Der Text unten rechts */
.button-text {
    align-self: flex-end;   /* Explizit rechts */
    line-height: 1;
    z-index: 50;         /* Hinter dem Text */
}

/* Drück-Effekt */
.main-button:active {
    box-shadow: inset 2px 2px 2px rgba(0, 0, 0, 0.5);
    transform: translateY(1px);
    /* background-color: #812222; */
}

</style>

</head>

<script>
  function show(id) {
    document.querySelectorAll('.content').forEach(el => el.style.display = 'none');
    document.getElementById('section' + id).style.display = 'block';
  }



function drawClock() {
    var canvas = document.getElementById("clock");
    var ctx = canvas.getContext("2d");
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    var centerX = canvas.width / 2;
    var centerY = canvas.height / 2;
    var radius = Math.min(centerX, centerY);
    ctx.setTransform(1, 0, 0, 1, 0, 0); 
    ctx.translate(centerX, centerY);
    drawFace(ctx, radius);
    drawTicks(ctx, radius);
    drawHands(ctx, radius);
}

    function drawFace(ctx, radius) {
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.95, 0, 2 * Math.PI);
      ctx.fillStyle = "#555555";
      ctx.fill();

    }

    function drawTicks(ctx, radius) {
      for (let i = 0; i < 60; i++) {
        const angle = (i * Math.PI) / 30;
        ctx.save();
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.strokeStyle = "#ecec5e";
        ctx.lineWidth = (i % 5 === 0) ? radius * 0.018 : radius * 0.01;

        const outer = radius * 0.95;
        const inner = (i % 5 === 0) ? outer - radius * 0.12 : outer - radius * 0.06;

        ctx.moveTo(0, -inner);
        ctx.lineTo(0, -outer);
        ctx.stroke();

        ctx.restore();
      }
    }

    function drawHands(ctx, radius) {
      const now = new Date();

      let hour = now.getHours();
      let minute = now.getMinutes();
      let second = now.getSeconds();

      hour = hour % 12;

      const hourAngle =
        (hour * Math.PI) / 6 +
        (minute * Math.PI) / (6 * 60) +
        (second * Math.PI) / (360 * 60);

      const minuteAngle =
        (minute * Math.PI) / 30 + (second * Math.PI) / (30 * 60);

      const secondAngle = (second * Math.PI) / 30;

      drawHand(ctx, hourAngle, radius * 0.5, radius * 0.05, "#ffffff");
      drawHand(ctx, minuteAngle, radius * 0.75, radius * 0.035, "#ffffff");

      // Sekundenzeiger
      const secLength = radius * 0.8;
      drawHand(ctx, secondAngle, secLength, radius * 0.012, "#e95555");

      // Kreis am Sekundenzeiger (50% größer, gefüllt)
      ctx.save();
      ctx.rotate(secondAngle);

      ctx.beginPath();
      ctx.lineWidth = radius * 0.012;
      ctx.strokeStyle = "#ff5252";
      ctx.arc(0, -secLength * 0.8, radius * 0.06, 0, 2 * Math.PI); // <-- größerer Kreis
      ctx.fill();
      ctx.stroke();

      ctx.restore();
    }

    function drawHand(ctx, angle, length, width, color) {
      ctx.save();
      ctx.beginPath();
      ctx.lineWidth = width;
      ctx.lineCap = "butt";
      ctx.strokeStyle = color;
      ctx.rotate(angle);

      ctx.moveTo(0, 0);
      ctx.lineTo(0, -length);
      ctx.stroke();

      ctx.restore();
    }

    setInterval(drawClock, 1000);
    drawClock();
 
</script>
