name: Update Wiki Sidebar

# Fires whenever a wiki page is created/edited (web UI or git push).
on:
  gollum:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate _Sidebar.md
        working-directory: wiki
        run: |
          if [ ! -f gen_sidebar.py ]; then
            echo "gen_sidebar.py not found in wiki repo — nothing to do."
            exit 0
          fi
          python gen_sidebar.py

      - name: Commit & push if changed
        working-directory: wiki
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- _Sidebar.md; then
            echo "Sidebar already up to date."
            exit 0
          fi
          git add _Sidebar.md
          git commit -m "chore(wiki): auto-regenerate sidebar"
          git push
