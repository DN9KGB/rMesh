name: Release Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  check-runner:
    runs-on: ubuntu-latest
    outputs:
      online: ${{ steps.check.outputs.online }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_PAT }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/actions/runners \
            --jq '[.runners[] | select(.labels[].name=="ai1") | .status] | first // "offline"' 2>/dev/null || echo "offline")
          echo "Runner status: $STATUS"
          if [ "$STATUS" = "online" ]; then
            echo "online=true" >> "$GITHUB_OUTPUT"
          else
            echo "online=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-runner
    runs-on: ${{ needs.check-runner.outputs.online == 'true' && fromJSON('["self-hosted","linux","ai1","platformio"]') || 'ubuntu-latest' }}
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for git describe to find the tag

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio/libdeps
          key: pio-${{ hashFiles('platformio.ini', 'extra_scripts/patch_lilygolib.py') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build all environments
        run: |
          # T-Echo (nRF52) is currently broken on CI — build locally via flashtool
          envs=$(pio project config --json-output | python3 -c "import json,sys; [print(s[0].split(':',1)[1]) for s in json.load(sys.stdin) if s[0].startswith('env:') and 'T-Echo' not in s[0]]")
          for e in $envs; do pio run -e "$e"; done

      - name: Collect firmware binaries
        run: |
          set -euo pipefail
          mkdir -p release
          for env_dir in .pio/build/*/; do
            env_name=$(basename "$env_dir")
            [ "$env_name" = "project.checksum" ] && continue
            [ ! -f "$env_dir/firmware.bin" ] && { echo "SKIP $env_name (no firmware.bin)"; continue; }
            for f in firmware.bin bootloader.bin partitions.bin; do
              [ -f "$env_dir/$f" ] && cp "$env_dir/$f" "release/${env_name}_${f}"
            done
            echo "OK $env_name"
          done

      - name: Build all filesystems
        run: |
          envs=$(pio project config --json-output | python3 -c "import json,sys; [print(s[0].split(':',1)[1]) for s in json.load(sys.stdin) if s[0].startswith('env:') and 'T-Echo' not in s[0]]")
          for e in $envs; do pio run -e "$e" --target buildfs; done

      - name: Collect filesystem images and package ZIPs
        run: |
          set -euo pipefail
          for env_dir in .pio/build/*/; do
            env_name=$(basename "$env_dir")
            [ "$env_name" = "project.checksum" ] && continue
            [ ! -f "release/${env_name}_firmware.bin" ] && continue
            [ -f "$env_dir/littlefs.bin" ] && cp "$env_dir/littlefs.bin" "release/${env_name}_littlefs.bin"
            echo "  $env_name: $(ls release/${env_name}_*.bin | xargs -n1 basename | tr '\n' ' ')"
            zip -j "release/${env_name}.zip" release/${env_name}_*.bin
          done

      - name: Generate esp-web-tools manifests
        run: python extra_scripts/gen_manifests.py "${{ github.ref_name }}" release

      - name: Extract release notes from CHANGELOG.md
        run: python extra_scripts/extract_changelog.py "${{ github.ref_name }}" > release_notes.md

      - name: List release assets
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}

