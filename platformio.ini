; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:LILYGO_T3_LoRa32_V1_6_1]  ;https://lilygo.cc/products/lora3?_pos=1&_sid=2b08416ed&_ss=r&variant=42272562282677
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = esp32dev
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps = 
	jgromes/RadioLib@^7.4.0
	ESP32Async/AsyncTCP
	esp32async/ESPAsyncWebServer@^3.8.0
	bblanchon/ArduinoJson@^7.4.2
board_build.filesystem = littlefs
build_flags = -D LILYGO_T3_LORA32_V1_6_1
;board_build.partitions = partitions.csv


[env:HELTEC_Wireless_Stick_Lite_V3]  ;https://heltec.org/project/wireless-stick-lite-v2/
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps = 
	jgromes/RadioLib@^7.4.0
	ESP32Async/AsyncTCP
	esp32async/ESPAsyncWebServer@^3.8.0
	bblanchon/ArduinoJson@^7.4.2
board_build.filesystem = littlefs
build_flags = -D HELTEC_WIRELESS_STICK_LITE_V3 
;board_build.partitions = partitions.csv